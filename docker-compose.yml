# Hardened run-time configuration for Pillow Polygons.
#
# Two services:
#   web    — serves HTTP, calls the Anthropic API, validates scene code. Needs
#            network. Does NOT execute scene code (RENDER_MODE=worker).
#   render — the ONLY place scene code runs. No network at all (network_mode:
#            none), seccomp-confined, read-only rootfs. Receives jobs from web
#            over a shared filesystem queue (see jobqueue.py / render_worker.py).
#
# Security layering (see DEPLOY.md):
#   app level   — AST allowlist + restricted builtins + subprocess rlimits (in code)
#   container   — non-root, read-only rootfs, dropped caps, no-new-privileges,
#                 seccomp, CPU/memory/PID limits; render is additionally network-isolated
#
# web publishes only to 127.0.0.1 — put a TLS reverse proxy (Caddy/nginx) in
# front and keep TRUST_PROXY=1 so per-IP rate limits use the real client IP.

x-render-env: &render-env
  RENDER_CPU_SECONDS: "10"
  RENDER_MEM_MB: "1024"
  RENDER_WALL_SECONDS: "20"
  RENDER_FSIZE_MB: "64"
  RENDER_CONCURRENCY: "1"     # worst-case render memory = one RENDER_MEM_MB
  JOBS_DIR: /jobs

services:
  web:
    build: .
    image: pillow-polygons:latest
    restart: unless-stopped
    init: true

    env_file:
      - .env            # ANTHROPIC_API_KEY=... (see .env.example)
    environment:
      <<: *render-env
      POLY_DB_PATH: /data/poly.db
      RENDER_MODE: worker          # hand renders to the network-less worker
      # Anti-abuse knobs (all optional; these are the defaults made explicit):
      TRUST_PROXY: "1"
      GENERATE_RATE_PER_MIN: "5"
      GENERATE_RATE_PER_DAY: "50"

    ports:
      - "127.0.0.1:8040:8040"

    # ── container hardening ──────────────────────────────────────────────
    user: "10001:10001"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 768m                 # web doesn't render; it only proxies jobs
    cpus: "2.0"

    tmpfs:
      - /tmp
    volumes:
      - poly-data:/data                            # SQLite DB (persistent)
      - poly-renders:/app/static/renders           # gallery output (read for serving)
      - jobs:/jobs                                 # render job queue (shared with render)

    depends_on:
      - render

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8040/api/tags', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 10s

  render:
    build: .
    image: pillow-polygons:latest
    restart: unless-stopped
    # No init/tini: the worker always join()s its render children, so there are
    # no zombies to reap, and it keeps the seccomp surface smaller.
    command: ["python", "render_worker.py"]

    environment:
      <<: *render-env

    # ── container hardening (stricter than web) ──────────────────────────
    network_mode: "none"            # no network stack at all — scene code can't phone home
    user: "10001:10001"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      # Deny-by-default seccomp allowlist with networking syscalls omitted.
      - seccomp:./seccomp/render-worker.json
    pids_limit: 256
    mem_limit: 1536m                # >= RENDER_MEM_MB(1024) * RENDER_CONCURRENCY(1) + headroom
    cpus: "2.0"

    tmpfs:
      - /tmp
    volumes:
      - poly-renders:/app/static/renders           # writes rendered images here
      - jobs:/jobs                                 # shared render job queue

volumes:
  poly-data:
  poly-renders:
  jobs:
